<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <title>To-Do-list</title>
    <!-- 웹글꼴 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
    <!-- 파비콘 -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <!-- 디자인 -->
    <link rel="stylesheet" href="./styles/reset.css"><!-- reset 먼저 작성 -->
    <link rel="stylesheet" href="./styles/index.css">
    <!-- <link rel="stylesheet" href="./styles/study.css"> -->
</head>
<body>
    <div id="wrap">
        <header>
            <div class="title_menu_search">
                <h1><a href="#">To Do</a></h1>
                <div class="menu_search">
                    <a href="#" class="search"><img src="./images/search.svg" alt="검색"></a>
                    <a href="#" class="menu"><img src="./images/menu.svg" alt="메뉴"></a>
                </div>
            </div><!-- e:title_menu_search -->
            <nav>
                <a href="#" class="all active">All<span class="num">(3)</span></a>
                <a href="#" class="today">Today<span class="num">(0)</span></a>
            </nav>
        </header>
        <main>
            <!-- 1. 날짜 및 목표 리스트 -->
            <ol class="list">
                <li>
                    <a href="#" class="date">05.12</a>
                    <a href="#" class="to_do">매일 책 15분 읽기 목표</a>
                </li>
                <li>
                    <a href="#" class="date">05.13</a>
                    <a href="#" class="to_do">치과 스케일링 하기</a>
                </li>
                <li>
                    <a href="#" class="date">05.14</a>
                    <a href="#" class="to_do">5km 러닝하기</a>
                </li>
                <li>
                    <a href="#" class="date">05.15</a>
                    <a href="#" class="to_do">헬스장 가기</a>
                </li>
                <li>
                    <a href="#" class="date">06.29</a>
                    <a href="#" class="to_do">CSS Flex 복습하기</a>
                </li>
            </ol>
            <!-- 2. 글쓰기 버튼 -->
            <a href="#" class="write_popup_btn"><img src="./images/write_btn.svg" alt="글 작성하기"></a>
            <!-- 3. 글쓰기 버튼 클릭 시 나오는 창 -->
            <div class="write_popup">
                <p class="info">add a new task.</p>
                <a href="#" class="write_btn"><img src="./images/register_btn.svg" alt="글 등록하기"></a>
            </div>
        </main>
    </div><!-- e:#wrap -->
</body>
</html>
